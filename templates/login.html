<!DOCTYPE html>
<html>

<head>

    <title>Admin Login</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>🔐 Admin Login</h1>

    <p class="subtitle">
        Authorized personnel only
    </p>

    <form action="{{ url_for('admin_login') }}" method="POST">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required>

        <br><br>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required>

        <br><br>

        <button type="submit">
            Login
        </button>

    </form>

    {% if error %}
    <div class="thankyou" style="background:#fee2e2;color:#991b1b;border-left:6px solid red;">
        {{ error }}
    </div>
    {% endif %}

</div>

</body>

</html>
